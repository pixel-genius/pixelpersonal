services:
  pixelpersonal:
    container_name: pixelpersonal
    image: pixelpersonal:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_IMAGE: docker.arvancloud.ir/oven/bun:1
        NPM_REGISTRY: https://registry.npmmirror.com
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    labels:
      - traefik.enable=true
      - traefik.http.routers.pixelpersonal.rule=Host(`pixelgenius.ir`)
      - traefik.http.routers.pixelpersonal.entrypoints=web
      - traefik.http.services.pixelpersonal.loadbalancer.server.port=3000
    networks:
      - dokploy-network
    ports:
      - "${APP_PORT:-3000}:3000"

networks:
  dokploy-network:
    external: true
