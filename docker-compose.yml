services:
  pixelpersonal:
    container_name: pixelpersonal
    image: pixelpersonal:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_IMAGE: docker.arvancloud.ir/oven/bun:1
        NPM_REGISTRY: https://registry.npmmirror.com
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${APP_PORT:-3000}:3000"
